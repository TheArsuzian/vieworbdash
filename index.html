<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ViewOrb</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0A0A0A;
  --bg2:#111111;
  --bg3:#161616;
  --bd:#222222;
  --bd2:#2E2E2E;
  --t1:#E8E8E8;
  --t2:#555555;
  --t3:#2A2A2A;
  --green:#3DD68C;
  --red:#E05252;
  --blue:#4F8EF7;
  --amber:#E8A020;
  --purple:#9B72CF;
  --teal:#2DC9A0;
  --mono:'Space Mono',monospace;
  --disp:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);}
body{color:var(--t1);font-family:var(--mono);font-size:11px;line-height:1.6;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
a{color:var(--blue);}

/* Cards — borderless, subtle background */
.card{background:var(--bg2);border:none;border-radius:10px;padding:16px 18px;}

/* Section title */
.ct{font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t2);margin-bottom:10px;}

/* Buttons */
.btn{cursor:pointer;font-family:var(--mono);font-size:10px;padding:5px 12px;border:1px solid var(--bd2);background:transparent;color:var(--t2);border-radius:5px;transition:all .12s;}
.btn:hover{background:var(--bg3);color:var(--t1);border-color:var(--bd2);}
.btn.pri{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700;}
.btn.pri:hover{opacity:.85;}
.btn.dng{border-color:transparent;color:var(--red);}
.btn.sm{padding:2px 8px;font-size:9px;}
.btn:disabled{opacity:.25;cursor:not-allowed;}

/* Inputs */
input,select,textarea{font-family:var(--mono);font-size:10px;background:var(--bg3);border:1px solid var(--bd);color:var(--t1);border-radius:5px;padding:6px 9px;outline:none;transition:border-color .12s;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
select{cursor:pointer;}

/* Tags — very minimal */
.tag{display:inline-flex;align-items:center;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.3px;}
.tg{color:var(--green);}
.tr{color:var(--red);}
.tb{color:var(--blue);}
.ta{color:var(--amber);}
.tp{color:var(--purple);}
.tt{color:var(--teal);}
.dim-tag{color:var(--t2);}

/* Chip */
.chip{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.3px;}

/* Tables */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);padding:5px 8px 6px;text-align:left;border-bottom:1px solid var(--bd);}
.tbl td{padding:7px 8px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.02);}

/* Lane labels */
.l1{color:var(--blue);font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:2px 6px;border-radius:3px;border:1px solid var(--blue)22;}
.l2{color:var(--purple);font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:2px 6px;border-radius:3px;border:1px solid var(--purple)22;}

/* Feed */
.feed{padding:10px 14px;border-left:1px solid var(--bd2);margin-bottom:8px;}
.feed.sig{border-color:var(--green);}
.feed.warn{border-color:var(--amber);}
.feed.plan{border-color:var(--purple);}
.feed.brief{border-color:var(--teal);}

/* Layout */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.up{color:var(--green);}
.dn{color:var(--red);}
.dim{color:var(--t2);}

@keyframes pulse{0%,100%{opacity:.2}50%{opacity:.7}}.pulse{animation:pulse 1.8s infinite;}
.ob{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.ob-card{width:440px;background:var(--bg2);border-radius:14px;padding:36px;}
.mo-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;}
.mo-card{background:var(--bg2);border-radius:12px;padding:22px;width:400px;max-width:95vw;}
.nav-tab{cursor:pointer;font-size:10px;padding:4px 12px;border:none;border-radius:4px;color:var(--t2);transition:all .12s;font-family:var(--mono);background:transparent;}
.nav-tab.active{background:var(--bg3);color:var(--t1);}
.nav-tab:hover:not(.active){color:var(--t1);}
.vt-btn{cursor:pointer;font-size:11px;padding:3px 9px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--mono);transition:all .12s;}
.vt-btn:first-child{border-radius:4px 0 0 4px;}
.vt-btn:last-child{border-radius:0 4px 4px 0;}
.vt-btn+.vt-btn{border-left:none;}
.vt-btn.vta{background:var(--bg3);color:var(--t1);}
.stat-row{display:flex;gap:22px;flex-wrap:wrap;align-items:center;padding:6px 0;}
.divider{height:1px;background:var(--bd);margin:12px 0;}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ── CONSTANTS ─────────────────────────────────────────────────────────────── */
const WATCHLIST=[
  {t:'RKLB',n:'Rocket Lab USA',theme:'space'},
  {t:'ASTS',n:'AST SpaceMobile',theme:'space'},
  {t:'MNTS',n:'Momentus',theme:'space'},
  {t:'RDW',n:'Redwire Corp.',theme:'space'},
  {t:'LUNR',n:'Intuitive Machines',theme:'space'},
  {t:'KTOS',n:'Kratos Defense',theme:'space'},
  {t:'LMT',n:'Lockheed Martin',theme:'space'},
  {t:'NVDA',n:'NVIDIA',theme:'chips'},
  {t:'AMD',n:'AMD',theme:'chips'},
  {t:'AVGO',n:'Broadcom',theme:'chips'},
  {t:'PLTR',n:'Palantir',theme:'ai'},
  {t:'AI',n:'C3.ai',theme:'ai'},
  {t:'IONQ',n:'IonQ',theme:'ai'},
  {t:'SOUN',n:'SoundHound AI',theme:'ai'},
  {t:'BBAI',n:'BigBear.ai',theme:'ai'},
  {t:'SMCI',n:'Super Micro Computer',theme:'datacenter'},
  {t:'VRT',n:'Vertiv Holdings',theme:'datacenter'},
  {t:'EQIX',n:'Equinix',theme:'datacenter'},
];
const DEFAULT_INDICES=[
  {label:'S&P 500',proxy:'SPY'},
  {label:'NASDAQ',proxy:'QQQ'},
  {label:'DOW',proxy:'DIA'},
  {label:'BTC',proxy:'IBIT'},
  {label:'VIX',proxy:'VIXY'},
];
const THEME_CLS={space:'tb',ai:'tp',chips:'ta',datacenter:'tt'};
const PHI={maxPos:.30,stopLoss:.08,tpBase:.10,tpMax:.30,trailStop:.08,maxOpen:5,minCash:.20};
const PAL=['#7094B8','#7094B8','#7094B8','#7094B8','#7094B8','#7094B8','#7094B8','#7094B8','#7094B8','#7094B8','#7094B8','#7094B8','#7094B8','#7094B8','#7094B8','#7094B8'];
const ALL_T=[...new Set([...WATCHLIST.map(s=>s.t),...DEFAULT_INDICES.map(i=>i.proxy)])];

/* ── UTILS ──────────────────────────────────────────────────────────────────── */
const $f=n=>'$'+Math.abs(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const nf=n=>(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=n=>(n>=0?'+':'')+Number(n||0).toFixed(2)+'%';
const fmt$=(n,s=false)=>{const v=$f(n);return s?(n>=0?'+':'-')+v:v;};
const mkCap=n=>n>=1000?`$${(n/1000).toFixed(1)}T`:`$${n.toFixed(0)}B`;
const tsNow=()=>new Date().toLocaleString('en-US',{hour12:false,month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
const chipColor=t=>{const i=ALL_T.indexOf(t);return PAL[Math.abs(i)%PAL.length]||'#60A5FA';};

function Chip({t,size=10}){const c=chipColor(t);return <span className="chip" style={{background:c+'22',color:c,fontSize:size}}>{t}</span>;}

function Spark({data,w=68,h=22}){
  if(!data||data.length<2)return <span style={{color:'var(--t3)',fontSize:9}}>—</span>;
  const mn=Math.min(...data),mx=Math.max(...data),r=mx-mn||.001;
  const pts=data.map((p,i)=>{const x=(i/(data.length-1))*w;const y=h-2-((p-mn)/r)*(h-4);return`${x.toFixed(1)},${y.toFixed(1)}`;}).join(' ');
  const up=data[data.length-1]>=data[0];
  return <svg width={w} height={h} style={{display:'block',overflow:'visible'}} aria-hidden="true"><polyline points={pts} fill="none" stroke={up?'var(--green)':'var(--red)'} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/></svg>;
}

/* ── FINNHUB ────────────────────────────────────────────────────────────────── */
async function fhQuote(sym,key){
  const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${key}`);
  return r.json();
}
async function fhMetric(sym,key){
  try{
    const r=await fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${sym}&metric=all&token=${key}`);
    const d=await r.json();
    return{h52:d.metric?.['52WeekHigh'],l52:d.metric?.['52WeekLow'],mktCap:d.metric?.marketCapitalization};
  }catch(e){return{};}
}
async function pollBatch(tickers,key,delayMs,onEach){
  for(const sym of tickers){
    try{const q=await fhQuote(sym,key);if(q?.c>0)onEach(sym,q);}catch(e){}
    await new Promise(r=>setTimeout(r,delayMs));
  }
}

/* ── INTELLIGENCE ───────────────────────────────────────────────────────────── */
async function vieworbScan(ak,portfolio,positions,cash,trades,isBrief=false){
  const portStr=portfolio.length?portfolio.map(h=>`${h.ticker} x${h.qty} @$${nf(h.avgCost)}`).join(', '):'none';
  const posStr=Object.keys(positions).length?Object.entries(positions).map(([t,p])=>`${t} $${$f(p.qty*(p.avgCost||0))} [L${p.lane}]`).join(', '):'none';
  const trStr=trades.slice(-5).map(t=>`${t.action} ${t.ticker} $${$f(t.posValue||0)}`).join(', ')||'none';
  const briefPfx=isBrief?'MORNING BRIEF: Begin with "MORNING BRIEF —" and give a broader market outlook for the day ahead.\n\n':'';
  const prompt=`${briefPfx}ViewOrb paper trader. Space/AI/chips thesis. Cash:$${nf(cash)} | Positions:${posStr} | Portfolio:${portStr} | Trades:${trStr}

Search latest space and AI stock news. Reply exactly:
MARKET READ: (2 sentences on space/AI/chip market conditions)
SIGNAL: (one ticker you are watching + exact reason)
PLAN: (what you plan to do next 24h based on your own signals and positions)
ADVICE: (one sharp observation based on your own algo trades and market reads only — never comment on the user's personal portfolio)`;

  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':ak,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
}

/* ── ALGO ───────────────────────────────────────────────────────────────────── */
function calcWinRate(trades){
  const closed=trades.filter(t=>t.action==='SELL'&&t.pnl!=null);
  if(!closed.length)return{wr:0,avgW:0,avgL:0,total:0,wins:0,losses:0,pf:0,best:null,worst:null};
  const wins=closed.filter(t=>t.pnl>0),losses=closed.filter(t=>t.pnl<=0);
  const avgW=wins.length?wins.reduce((s,t)=>s+t.pnl,0)/wins.length:0;
  const avgL=losses.length?losses.reduce((s,t)=>s+Math.abs(t.pnl),0)/losses.length:0;
  const tp=wins.reduce((s,t)=>s+t.pnl,0),tl=Math.abs(losses.reduce((s,t)=>s+t.pnl,0));
  const best=closed.reduce((a,b)=>b.pnl>a.pnl?b:a,closed[0]);
  const worst=closed.reduce((a,b)=>b.pnl<a.pnl?b:a,closed[0]);
  return{wr:wins.length/closed.length*100,avgW,avgL,total:closed.length,wins:wins.length,losses:losses.length,pf:tl>0?tp/tl:tp>0?999:0,best,worst};
}

function runAlgo(cash,positions,prices,priceHist,intelligence,mirrorEnabled,dynamicUniverse){
  const newTrades=[];
  const pos=JSON.parse(JSON.stringify(positions));
  let cash_=cash;
  const tv=()=>cash_+Object.entries(pos).reduce((s,[t,p])=>s+(prices[t]||p.avgCost)*p.qty,0);

  Object.entries(pos).forEach(([ticker,p])=>{
    const price=prices[ticker];if(!price)return;
    const ret=(price-p.avgCost)/p.avgCost;
    const newHigh=Math.max(p.highWater||price,price);
    pos[ticker].highWater=newHigh;
    const posVal=price*p.qty;

    if(ret<=-PHI.stopLoss){
      cash_+=posVal;
      newTrades.push({action:'SELL',ticker,qty:p.qty,price,posValue:posVal,pnl:(price-p.avgCost)*p.qty,reason:`Stop loss at ${(ret*100).toFixed(1)}%`,ts:new Date(),lane:p.lane});
      delete pos[ticker];return;
    }
    if(p.partialTaken&&price<newHigh*(1-PHI.trailStop)){
      cash_+=posVal;
      newTrades.push({action:'SELL',ticker,qty:p.qty,price,posValue:posVal,pnl:(price-p.avgCost)*p.qty,reason:`Trailing stop — peak $${nf(newHigh)}`,ts:new Date(),lane:p.lane});
      delete pos[ticker];return;
    }
    if(ret>=PHI.tpBase&&!p.partialTaken&&p.qty>=2){
      const sq=Math.max(1,Math.floor(p.qty*.5));
      const sv=sq*price;
      cash_+=sv;
      pos[ticker]={...p,qty:p.qty-sq,partialTaken:true,highWater:price};
      newTrades.push({action:'SELL',ticker,qty:sq,price,posValue:sv,pnl:(price-p.avgCost)*sq,reason:`Partial exit +${(ret*100).toFixed(1)}% — trailing remainder`,ts:new Date(),lane:p.lane});
      return;
    }
    if(ret>=PHI.tpMax){
      cash_+=posVal;
      newTrades.push({action:'SELL',ticker,qty:p.qty,price,posValue:posVal,pnl:(price-p.avgCost)*p.qty,reason:`30% ceiling hit — full exit`,ts:new Date(),lane:p.lane});
      delete pos[ticker];
    }
  });

  const openCnt=Object.keys(pos).length;
  const total=tv();
  if(openCnt<PHI.maxOpen&&cash_/total>PHI.minCash){
    const lane1Tickers=Object.entries(pos).filter(([,p])=>p.lane===1).map(([t])=>t);
    (dynamicUniverse||WATCHLIST).forEach(stock=>{
      if(pos[stock.t]||lane1Tickers.includes(stock.t)||Object.keys(pos).length>=PHI.maxOpen)return;
      const price=prices[stock.t],h=priceHist[stock.t]||[];
      if(!price||h.length<20)return;
      const ma10=h.slice(-10).reduce((a,b)=>a+b,0)/10;
      const ma20=h.slice(-20).reduce((a,b)=>a+b,0)/20;
      const mom5=h.length>=5?(price-h[h.length-5])/h[h.length-5]:0;
      const boost=intelligence&&intelligence.toLowerCase().includes(stock.t.toLowerCase())?1.6:1.0;
      const signal=((ma10/ma20-1)*2+mom5*3)*boost;
      if(signal>.004){
        const conv=Math.min(signal/.012,1.0);
        const posCap=stock.isScout?0.15:PHI.maxPos;
        const qty=Math.floor(Math.min(total*posCap*(.5+conv*.5),cash_*.9)/price);
        if(qty>0&&price*qty<=cash_){
          const posVal=qty*price;
          cash_-=posVal;
          pos[stock.t]={qty,avgCost:price,highWater:price,partialTaken:false,lane:2,theme:stock.theme};
          newTrades.push({
            action:'BUY',ticker:stock.t,qty,price,posValue:posVal,pnl:null,
            reason:`MA signal ${(signal*100).toFixed(1)}% | MA10 ${((ma10/ma20-1)*100).toFixed(2)}% over MA20 | 5d momentum ${(mom5*100).toFixed(2)}%${boost>1?' | intel match':''}${stock.isScout?' | scout discovery':''}`,
            ts:new Date(),lane:2,theme:stock.theme,isScout:stock.isScout||false
          });
        }
      }
    });
  }
  // LANE 1 — signal-based mirroring of enabled portfolio stocks
  if(mirrorEnabled&&mirrorEnabled.length>0&&Object.keys(pos).length<PHI.maxOpen&&cash_/tv()>PHI.minCash){
    mirrorEnabled.forEach(stock=>{
      if(pos[stock.t]||Object.keys(pos).length>=PHI.maxOpen)return;
      const price=prices[stock.t],h=priceHist[stock.t]||[];
      if(!price||h.length<20)return;
      const ma10=h.slice(-10).reduce((a,b)=>a+b,0)/10;
      const ma20=h.slice(-20).reduce((a,b)=>a+b,0)/20;
      const mom5=h.length>=5?(price-h[h.length-5])/h[h.length-5]:0;
      const boost=intelligence&&intelligence.toLowerCase().includes(stock.t.toLowerCase())?1.4:1.0;
      const signal=((ma10/ma20-1)*2+mom5*3)*boost;
      if(signal>.003){
        const conv=Math.min(signal/.010,1.0);
        const qty=Math.floor(Math.min(tv()*PHI.maxPos*(.4+conv*.4),cash_*.9)/price);
        if(qty>0&&price*qty<=cash_){
          const posVal=qty*price;
          cash_-=posVal;
          pos[stock.t]={qty,avgCost:price,highWater:price,partialTaken:false,lane:1,theme:stock.theme||'portfolio'};
          newTrades.push({
            action:'BUY',ticker:stock.t,qty,price,posValue:posVal,pnl:null,
            reason:`L1 mirror — signal ${(signal*100).toFixed(1)}% | MA ${((ma10/ma20-1)*100).toFixed(2)}% | mom ${(mom5*100).toFixed(2)}%`,
            ts:new Date(),lane:1,theme:stock.theme||'portfolio'
          });
        }
      }
    });
  }

  return{newTrades,positions:pos,cash:cash_};
}

/* ── PDF EXPORT ─────────────────────────────────────────────────────────────── */
function exportDailyPDF(cash,positions,prices,trades,winStats,latestIntel){
  if(!window.jspdf){alert('PDF library loading — try again in a moment.');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const today=new Date();
  const tv=cash+Object.entries(positions).reduce((s,[t,p])=>s+(prices[t]||p.avgCost)*p.qty,0);
  const pnl=tv-40000;
  let y=20;

  const hdr=(txt,sz=10,clr=[107,122,150])=>{doc.setFontSize(sz);doc.setTextColor(...clr);doc.text(txt,20,y);};
  const val=(txt,clr=[208,214,226])=>{doc.setFontSize(10);doc.setTextColor(...clr);doc.text(txt,20,y);y+=6;};
  const nl=(n=4)=>{y+=n;};
  const div=()=>{doc.setDrawColor(26,36,56);doc.line(20,y,190,y);y+=5;};

  doc.setFillColor(7,9,15);doc.rect(0,0,210,297,'F');
  doc.setFontSize(20);doc.setFont('helvetica','bold');doc.setTextColor(208,214,226);doc.text('SHERKVIEW',20,y);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(107,122,150);
  doc.text('Daily Trading Report — '+today.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),20,y+7);
  y+=18;div();

  hdr('ACCOUNT SUMMARY',8);y+=6;
  val(`Total Value:    $${nf(tv)}`);
  val(`Cash:           $${nf(cash)}`);
  val(`Invested:       $${nf(Math.max(0,tv-cash))}`);
  val(pnl>=0?`Total P&L:      +$${nf(pnl)} (+${((pnl/40000)*100).toFixed(2)}%)`:`Total P&L:      -$${nf(Math.abs(pnl))} (${((pnl/40000)*100).toFixed(2)}%)`,pnl>=0?[74,222,128]:[248,113,113]);
  nl();div();

  hdr('PERFORMANCE',8);y+=6;
  val(`Win Rate: ${winStats.wr.toFixed(1)}%  |  Total Trades: ${winStats.total}  |  Wins: ${winStats.wins}  |  Losses: ${winStats.losses}`);
  val(`Avg Win: $${nf(winStats.avgW)}  |  Avg Loss: $${nf(winStats.avgL)}  |  Profit Factor: ${winStats.pf.toFixed(2)}`);
  nl();div();

  const posArr=Object.entries(positions);
  hdr(`OPEN POSITIONS (${posArr.length})`,8);y+=6;
  if(!posArr.length){val('No open positions',[107,122,150]);}
  else{posArr.forEach(([t,p])=>{const cur=prices[t]||p.avgCost;const pv=(cur-p.avgCost)*p.qty;val(`${t.padEnd(6)} $${nf(cur*p.qty)} | Entry $${nf(p.avgCost)} → $${nf(cur)} | P&L ${pv>=0?'+':'-'}$${nf(Math.abs(pv))} | L${p.lane}`,pv>=0?[74,222,128]:[248,113,113]);});}
  nl();div();

  const todayStart=new Date();todayStart.setHours(0,0,0,0);
  const todayTrades=trades.filter(t=>new Date(t.ts)>=todayStart);
  hdr(`TODAY'S TRADES (${todayTrades.length})`,8);y+=6;
  if(!todayTrades.length){val('No trades today',[107,122,150]);}

function getNYDate(){
  try{
    const parts=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date());
    const y=parts.find(p=>p.type==='year')?.value;
    const m=parts.find(p=>p.type==='month')?.value;
    const d=parts.find(p=>p.type==='day')?.value;
    return `${y}-${m}-${d}`;
  }catch(e){return '';}
}

function getHolidayName(){
  return NYSE_HOLIDAYS[getNYDate()]||null;
}

/* ── HEADER ─────────────────────────────────────────────────────────────────── */
function Header({tab,setTab,lastPoll,onSettings,notifsMuted,setNotifsMuted}){
  const [t,setT]=useState(new Date().toLocaleTimeString('en-US',{hour12:false}));
  const [showHoliday,setShowHoliday]=useState(false);
  useEffect(()=>{const id=setInterval(()=>setT(new Date().toLocaleTimeString('en-US',{hour12:false})),1000);return()=>clearInterval(id);},[]);

  const getMktInfo=(()=>{
    try{
      const now=new Date();
      const holiday=getHolidayName();
      if(holiday) return {label:`Closed — ${holiday}`,isOpen:false,isHoliday:true,holidayName:holiday};
      const ny=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',weekday:'short',hour:'numeric',minute:'2-digit',hour12:false}).formatToParts(now);
      const day=ny.find(x=>x.type==='weekday')?.value;
      const h=parseInt(ny.find(x=>x.type==='hour')?.value||0);
      const m=parseInt(ny.find(x=>x.type==='minute')?.value||0);
      const n=h*100+m;
      const nyNow=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
      const minsUntil=(targetH,targetM,addDays=0)=>{
        const t=new Date(nyNow);
        if(addDays)t.setDate(t.getDate()+addDays);
        t.setHours(targetH,targetM,0,0);
        const diff=Math.max(0,t-nyNow);
        const hrs=Math.floor(diff/3600000);
        const mins=Math.floor((diff%3600000)/60000);
        return hrs>0?`${hrs}h ${mins}m`:`${mins}m`;
      };
      if(['Sat','Sun'].includes(day)){
        const add=day==='Sat'?2:1;
        return {label:`Weekend — opens in ${minsUntil(9,30,add)}`,isOpen:false,isHoliday:false};
      }
      if(n>=930&&n<1600) return {label:'● NYSE open',isOpen:true,isHoliday:false};
      if(n>=400&&n<930)  return {label:`Pre-market — opens in ${minsUntil(9,30)}`,isOpen:false,isHoliday:false};
      if(n>=1600&&n<2000)return {label:'After hours',isOpen:false,isHoliday:false};
      return {label:`Closed — opens in ${minsUntil(9,30,1)}`,isOpen:false,isHoliday:false};
    }catch(e){return {label:'',isOpen:false,isHoliday:false};}
  })();

  const {label:mktLabel,isOpen,isHoliday,holidayName}=getMktInfo;
  return(
    <>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 24px',borderBottom:'1px solid var(--bd)',background:'var(--bg)',position:'sticky',top:0,zIndex:100}}>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div style={{display:'flex',flexDirection:'column'}}>
          <div style={{fontFamily:'var(--disp)',fontSize:18,fontWeight:800,color:'#fff',lineHeight:1}}>View<span style={{color:'var(--blue)'}}>Orb</span></div>
          <div style={{fontSize:8,color:'var(--t2)',letterSpacing:'1.5px',textTransform:'uppercase',marginTop:2}}>Portfolio Tracker</div>
        </div>
        <div style={{display:'flex',gap:4}}>
          {['Dashboard','Signals','Performance'].map(tb=><button key={tb} className={`nav-tab${tab===tb?' active':''}`} onClick={()=>setTab(tb)}>{tb}</button>)}
        </div>
        <span
          className={`tag ${isOpen?'tg':isHoliday?'tr':'ta'}`}
          style={{fontSize:8,cursor:isHoliday?'pointer':'default',userSelect:'none'}}
          onClick={()=>isHoliday&&setShowHoliday(true)}
          title={isHoliday?'Click for details':''}
        >{mktLabel}{isHoliday?' ⓘ':''}</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        {lastPoll&&<span style={{fontSize:9,color:'var(--t2)'}}>↺ {lastPoll}</span>}
        <span style={{fontSize:10,color:'var(--t2)',fontFamily:'var(--mono)'}}>{t}</span>
        <button className="btn sm" onClick={()=>setNotifsMuted(m=>!m)} title={notifsMuted?'Notifications muted — click to unmute':'Notifications on — click to mute'} style={{color:notifsMuted?'var(--t2)':'var(--t1)'}}>
          {notifsMuted?'🔕':'🔔'}
        </button>
        <button className="btn sm" onClick={onSettings}>⚙</button>
      </div>
    </div>
    {showHoliday&&isHoliday&&(
      <div style={{position:'fixed',inset:0,zIndex:300,display:'flex',alignItems:'flex-start',justifyContent:'flex-start',paddingTop:52,paddingLeft:18}} onClick={()=>setShowHoliday(false)}>
        <div style={{background:'var(--bg2)',border:'1px solid var(--bd)',borderRadius:8,padding:'14px 18px',minWidth:220,boxShadow:'0 8px 32px rgba(0,0,0,.6)'}} onClick={e=>e.stopPropagation()}>

          <div style={{fontSize:14,fontWeight:700,color:'#fff',marginBottom:4}}>{holidayName}</div>
          <div style={{fontSize:10,color:'var(--t2)',marginBottom:10}}>Market is closed today.</div>
          <button className="btn sm" onClick={()=>setShowHoliday(false)}>Close</button>
        </div>
      </div>
    )}
    </>
  );
}

/* ── INDICES STRIP ──────────────────────────────────────────────────────────── */
function IndicesStrip({prices,prevClose,indices,setIndices}){
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({label:'',proxy:''});

  const add=()=>{
    const t=form.proxy.trim().toUpperCase(),l=form.label.trim()||t;
    if(!t)return;
    const newList=[...indices,{label:l,proxy:t}];
    setIndices(newList);
    localStorage.setItem('sv_indices',JSON.stringify(newList));
    setForm({label:'',proxy:''});
  };
  const remove=(proxy)=>{
    const next=indices.filter(i=>i.proxy!==proxy);
    setIndices(next);
    localStorage.setItem('sv_indices',JSON.stringify(next));
  };

  return(
    <div style={{borderBottom:'1px solid var(--bd)',background:'var(--bg)'}}>
      <div style={{display:'flex',gap:12,overflowX:'auto',padding:'10px 24px',alignItems:'center'}}>
        {indices.map(idx=>{
          const cur=prices[idx.proxy],prev=prevClose[idx.proxy];
          const chg=cur&&prev?((cur-prev)/prev)*100:null;
          const up=chg>=0;
          return(
            <div key={idx.proxy} style={{minWidth:90,flexShrink:0,padding:'6px 0',position:'relative'}}>
              {editing&&<button onClick={()=>remove(idx.proxy)} style={{position:'absolute',top:2,right:3,background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:9,lineHeight:1}}>✕</button>}
              <div style={{fontSize:8,color:'var(--t2)',letterSpacing:1,marginBottom:2}}>{idx.label}</div>
              <div style={{fontSize:13,fontWeight:700,color:'#fff',fontFamily:'var(--mono)'}}>{cur?(cur>=1000?cur.toLocaleString('en-US',{maximumFractionDigits:0}):cur.toFixed(2)):<span className="pulse" style={{color:'var(--t3)'}}>—</span>}</div>
              <div style={{fontSize:9,fontFamily:'var(--mono)',color:chg==null?'var(--t2)':up?'var(--green)':'var(--red)'}}>{chg!=null?pct(chg):'—'}</div>
            </div>
          );
        })}
        <button className="btn sm" onClick={()=>setEditing(e=>!e)} style={{flexShrink:0,fontSize:9,padding:'3px 8px'}}>{editing?'Done':'✎ Edit'}</button>
      </div>
      {editing&&(
        <div style={{display:'flex',gap:8,padding:'0 18px 9px',alignItems:'center'}}>
          <input value={form.label} onChange={e=>setForm(p=>({...p,label:e.target.value}))} placeholder="Label (optional)" style={{width:100,fontSize:9,padding:'3px 7px'}}/>
          <input value={form.proxy} onChange={e=>setForm(p=>({...p,proxy:e.target.value.toUpperCase()}))} placeholder="Ticker (e.g. GLD)" style={{width:100,fontSize:9,padding:'3px 7px'}} onKeyDown={e=>e.key==='Enter'&&add()}/>
          <button className="btn sm" onClick={add}>+ Add</button>
          <span style={{fontSize:9,color:'var(--t2)'}}>Any ETF or stock ticker works</span>
        </div>
      )}
    </div>
  );
}

/* ── TREEMAP ────────────────────────────────────────────────────────────────── */
function Treemap({holdings,prices}){
  if(!holdings.length)return <div style={{color:'var(--t2)',textAlign:'center',padding:'30px 0',fontSize:10}}>No positions</div>;
  const items=holdings.map(h=>{const cur=prices[h.ticker]||h.avgCost;return{...h,cur,val:cur*h.qty,ret:(cur-h.avgCost)/h.avgCost*100};}).sort((a,b)=>b.val-a.val);
  const total=items.reduce((s,i)=>s+i.val,0);
  return(
    <div style={{display:'flex',flexWrap:'wrap',gap:4,minHeight:140,padding:'2px 0'}}>
      {items.map(item=>{
        const w=Math.max(item.val/total*100,9);
        const intensity=Math.min(Math.abs(item.ret)/15,1);
        const bg=item.ret>=0?`rgba(74,222,128,${.1+intensity*.5})`:`rgba(248,113,113,${.1+intensity*.5})`;
        const tc=item.ret>=0?'var(--green)':'var(--red)';
        const valStr=item.val>=1000?`$${(item.val/1000).toFixed(1)}k`:`$${item.val.toFixed(0)}`;
        return(
          <div key={item.ticker} style={{flex:`${w} 1 ${w}%`,minWidth:70,background:bg,border:`1px solid ${item.ret>=0?'#4ADE8030':'#F8717130'}`,borderRadius:5,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'8px 4px',gap:2}}>
            <div style={{fontSize:12,fontWeight:700,color:'#fff'}}>{item.ticker}</div>
            <div style={{fontSize:9,color:tc,fontFamily:'var(--mono)'}}>{item.ret>=0?'+':''}{item.ret.toFixed(2)}%</div>
            <div style={{fontSize:8,color:'rgba(255,255,255,.4)',fontFamily:'var(--mono)'}}>{valStr}</div>
          </div>
        );
      })}
    </div>
  );
}

    return data.slice(-( n[p]||data.length));
  };

  useEffect(()=>{
    if(!ref.current)return;

        scales:{
          x:{display:false},

function Portfolio({portfolio,setPortfolio,prices,prevClose,priceHist,fundamentals,cfg,mirrorSet,setMirrorSet}){
  const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch]=useState('');
  const [view,setView]=useState('table');
  const [form,setForm]=useState({ticker:'',qty:'',cost:'',posSize:'',date:''});
  const [err,setErr]=useState('');
  const [tickerSugg,setTickerSugg]=useState([]);

  const filtered=portfolio.filter(h=>!search.trim()||h.ticker.toUpperCase().includes(search.toUpperCase().trim()));
  const totVal=portfolio.reduce((s,h)=>s+(prices[h.ticker]||h.avgCost)*h.qty,0);
  const totCost=portfolio.reduce((s,h)=>s+h.avgCost*h.qty,0);
  const totPnL=totVal-totCost;
  const dayPnL=portfolio.reduce((s,h)=>s+((prices[h.ticker]||h.avgCost)-(prevClose[h.ticker]||h.avgCost))*h.qty,0);

  const add=()=>{
    const t=form.ticker.trim().toUpperCase();
    let qty=parseFloat(form.qty);
    const c=parseFloat(form.cost);
    if(!qty&&form.posSize&&c)qty=parseFloat(form.posSize)/c;
    if(!t||!qty||!c||qty<=0||c<=0){setErr('Need ticker + (shares or position $) + avg cost.');return;}
    qty=Math.round(qty*10000)/10000;
    const ex=portfolio.find(p=>p.ticker===t);
    if(ex){const nq=ex.qty+qty;setPortfolio(prev=>prev.map(p=>p.ticker===t?{...p,qty:nq,avgCost:(ex.avgCost*ex.qty+c*qty)/nq}:p));}
    else setPortfolio(prev=>[...prev,{ticker:t,qty,avgCost:c,date:form.date||new Date().toLocaleDateString()}]);
    setForm({ticker:'',qty:'',cost:'',posSize:'',date:''});setErr('');setShowAdd(false);
  };

  return(
    <div className="card" style={{marginBottom:11}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:9}}>
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <span className="ct" style={{marginBottom:0}}>My Portfolio</span>
          <span style={{fontSize:10,color:'var(--t2)'}}>
            <span style={{color:'#fff',fontWeight:700}}>{$f(totVal)}</span>{'  '}
            <span style={{color:totPnL>=0?'var(--green)':'var(--red)'}}>{fmt$(totPnL,true)}</span>{'  '}
            <span>day </span><span style={{color:dayPnL>=0?'var(--green)':'var(--red)'}}>{fmt$(dayPnL,true)}</span>
          </span>
        </div>
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <div style={{display:'flex'}}>
            {[{id:'table',l:'≡'},{id:'map',l:'▦'},{id:'cards',l:'⊞'}].map(v=><button key={v.id} className={`vt-btn${view===v.id?' vta':''}`} onClick={()=>setView(v.id)} title={v.id}>{v.l}</button>)}
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filter holdings…" style={{width:110,fontSize:9,padding:'3px 7px'}} title="Filter your existing holdings by ticker"/>
          <button className="btn sm" onClick={()=>{setShowAdd(s=>!s);setErr('');}}>{showAdd?'✕ Cancel':'+ Add'}</button>
        </div>
      </div>

      {showAdd&&(
        <div style={{background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:5,padding:11,marginBottom:9}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:7,marginBottom:7}}>
            {[{label:'TICKER',key:'ticker',ph:'RKLB'},{label:'SHARES',key:'qty',ph:'100',type:'number'},{label:'AVG COST $',key:'cost',ph:'12.50',type:'number'},{label:'OR POS SIZE $',key:'posSize',ph:'1250',type:'number'},{label:'DATE',key:'date',ph:'',type:'date'}].map(f=>(
              <div key={f.key} style={{position:'relative'}}>
                <div style={{fontSize:7,color:'var(--t2)',marginBottom:3,letterSpacing:1}}>{f.label}</div>
                {f.key==='ticker'?(
                  <>
                    <input type="text" value={form.ticker}
                      onChange={e=>{
                        const v=e.target.value.toUpperCase();
                        setForm(p=>({...p,ticker:v}));
                        if(v.length>0){
                          const sugg=WATCHLIST.filter(s=>s.t.startsWith(v)||s.n.toUpperCase().includes(v)).slice(0,6);
                          setTickerSugg(sugg);
                        } else setTickerSugg([]);
                      }}
                      onBlur={()=>setTimeout(()=>setTickerSugg([]),150)}
                      placeholder="RKLB" style={{width:'100%'}} onKeyDown={e=>e.key==='Enter'&&add()}/>
                    {tickerSugg.length>0&&(
                      <div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--bg2)',border:'1px solid var(--bd2)',borderRadius:4,zIndex:50,maxHeight:160,overflowY:'auto'}}>
                        {tickerSugg.map(s=>(
                          <div key={s.t} onClick={()=>{setForm(p=>({...p,ticker:s.t}));setTickerSugg([]);}}
                            style={{padding:'5px 9px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid var(--bd)'}}
                            onMouseOver={e=>e.currentTarget.style.background='var(--bg3)'}
                            onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                            <span style={{fontWeight:700,color:chipColor(s.t),fontFamily:'var(--mono)',fontSize:11}}>{s.t}</span>
                            <span style={{fontSize:9,color:'var(--t2)'}}>{s.n}</span>
                            <span className={`tag ${THEME_CLS[s.theme]||'tb'}`} style={{fontSize:8}}>{s.theme}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </>
                ):(
                  <input type={f.type||'text'} value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} placeholder={f.ph} style={{width:'100%'}} onKeyDown={e=>e.key==='Enter'&&add()}/>
                )}
              </div>
            ))}
          </div>
          {err&&<div style={{color:'var(--red)',fontSize:9,marginBottom:6}}>{err}</div>}
          <button className="btn pri" onClick={add} style={{fontSize:10}}>Add Position</button>
          <span style={{fontSize:8,color:'var(--t2)',marginLeft:8}}>Use shares or position $ — not both</span>
        </div>
      )}

      {portfolio.length===0?(
        <div style={{color:'var(--t2)',textAlign:'center',padding:'18px 0',fontSize:10}}>No positions yet — add your real holdings above</div>
      ):(
        <>
          {view==='table'&&<TableView holdings={filtered} prices={prices} prevClose={prevClose} priceHist={priceHist} fundamentals={fundamentals} onDel={t=>setPortfolio(prev=>prev.filter(p=>p.ticker!==t))} mirrorSet={mirrorSet} setMirrorSet={setMirrorSet}/>}
          {view==='map'&&<Treemap holdings={filtered} prices={prices}/>}
          {view==='cards'&&<CardGrid holdings={filtered} prices={prices} prevClose={prevClose}/>}
        </>
      )}
    </div>
  );
}

function SignalNotification({signal,onConfirm,onDismiss}){
  const [expired,setExpired]=useState(false);
  const [timeLeft,setTimeLeft]=useState('');

  useEffect(()=>{
    const tick=()=>{
      const ms=new Date(signal.expiry)-Date.now();
      if(ms<=0){setExpired(true);setTimeLeft('Expired');return;}
      const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);
      setTimeLeft(`${m}:${s.toString().padStart(2,'0')}`);
    };
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[signal]);

  const isBuy=signal.action==='BUY';
  const devPct=(signal.deviation*100).toFixed(0);
  const upper=$f(signal.price*(1+signal.deviation));
  const lower=$f(signal.price*(1-signal.deviation));

  return(
    <div style={{
      position:'fixed',top:70,right:20,zIndex:500,
      background:'var(--bg2)',border:`1px solid ${isBuy?'var(--green)':'var(--red)'}`,
      borderRadius:10,padding:'14px 16px',width:300,
      boxShadow:'0 8px 32px rgba(0,0,0,.6)'
    }}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
        <div>
          <div style={{fontSize:9,color:'var(--t2)',letterSpacing:1,textTransform:'uppercase',marginBottom:3}}>ViewOrb Signal</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:16,fontWeight:700,color:isBuy?'var(--green)':'var(--red)',fontFamily:'var(--mono)'}}>{signal.action}</span>
            <span style={{fontSize:16,fontWeight:700,color:'var(--t1)',fontFamily:'var(--mono)'}}>{signal.ticker}</span>
            <span style={{fontSize:14,color:'var(--t1)',fontFamily:'var(--mono)'}}>${nf(signal.price)}</span>
          </div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:9,color:'var(--t2)'}}>Valid for</div>
          <div style={{fontSize:14,fontWeight:700,fontFamily:'var(--mono)',color:expired?'var(--red)':'var(--amber)'}}>{timeLeft}</div>
        </div>
      </div>

      <div style={{background:'var(--bg3)',borderRadius:6,padding:'8px 10px',marginBottom:10,fontSize:10,lineHeight:1.7}}>
        {isBuy?(
          <>
            <div style={{color:'var(--t2)'}}>Skip if price is above <span style={{color:'var(--red)',fontWeight:700}}>{upper}</span> (+{devPct}%)</div>
            <div style={{color:'var(--t2)'}}>Skip if price drops below <span style={{color:'var(--red)',fontWeight:700}}>{lower}</span> (-{devPct}%)</div>
          </>
        ):(
          <div style={{color:'var(--t2)'}}>Skip if price drops below <span style={{color:'var(--red)',fontWeight:700}}>{lower}</span> (-{devPct}%)</div>
        )}
        <div style={{color:'var(--t2)',marginTop:4,fontSize:9}}>{signal.reason}</div>
      </div>

      {!expired&&signal.confirmed===null&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
          <button className="btn pri" style={{fontSize:10,padding:'6px 0'}} onClick={()=>onConfirm(signal.id,'yes')}>✓ Executed</button>
          <button className="btn" style={{fontSize:10,padding:'6px 0'}} onClick={()=>onConfirm(signal.id,'missed')}>Missed</button>
          <button className="btn" style={{fontSize:10,padding:'6px 0',color:'var(--t2)'}} onClick={()=>onDismiss(signal.id)}>Skip</button>
        </div>
      )}
      {(expired||signal.confirmed!==null)&&(
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:10,color:'var(--t2)'}}>{expired?'Signal expired':signal.confirmed==='yes'?'✓ Executed':'Missed/Skipped'}</span>
          <button className="btn sm" onClick={()=>onDismiss(signal.id)}>Dismiss</button>
        </div>
      )}
    </div>
  );
}

function ViewOrbPanel({cash,positions,prices,prevClose,priceHist,trades,feed,portfolio,mirrorSet,onScan,scanning,onExportPDF,scoutWatchlist,setScoutWatchlist,scoutScanning}){
