  const pnl=tv-40000,pnlP=(pnl/40000)*100;
  const winStats=useMemo(()=>calcWinRate(trades),[trades]);
  const lane2=Object.entries(positions).filter(([,p])=>p.lane===2);
  const lane1m=portfolio.filter(h=>mirrorSet[h.ticker]!==false).map(h=>({
    ...h,
    pos:positions[h.ticker]&&positions[h.ticker].lane===1?positions[h.ticker]:null
  }));
  const [posView,setPosView]=useState('table');
  const latestIntel=feed[0]?.text||'';

  const latestPlan=useMemo(()=>{
    for(const e of feed){if(e.text.includes('PLAN:')){const i=e.text.indexOf('PLAN:');const end=e.text.indexOf('\n\n',i+5);return e.text.slice(i+5,end>0?end:i+500).trim();}}
    return null;
  },[feed]);

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:11}}>
        <div style={{display:'flex',flexDirection:'column',marginRight:4}}>
          <div style={{fontFamily:'var(--disp)',fontSize:18,fontWeight:800,color:'#fff',lineHeight:1}}>View<span style={{color:'var(--blue)'}}>Orb</span></div>
          <div style={{fontSize:8,color:'var(--t2)',letterSpacing:'1.5px',textTransform:'uppercase',marginTop:2}}>Algo Trader</div>
        </div>
        <span className="tag dim-tag">$40K paper</span>
        <span className="tag dim-tag">Space</span><span className="tag dim-tag">AI</span><span className="tag dim-tag">Chips</span><span className="tag dim-tag">Data Centers</span>
        <span style={{fontSize:9,color:'var(--t2)',marginLeft:4}}>Algo fires every 30s · Intel every hour</span>
        <button className="btn sm" onClick={onExportPDF} style={{marginLeft:'auto'}}>↓ Export PDF</button>
      </div>

      {/* Metrics */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:0,marginBottom:16,borderBottom:'1px solid var(--bd)',paddingBottom:4}}>
        {[{label:'Total Value',val:$f(tv)},{label:'Cash',val:$f(cash),color:'var(--blue)'},{label:'Invested',val:$f(Math.max(0,tv-cash)),color:'var(--amber)'},{label:'P&L',val:fmt$(pnl,true),sub:pct(pnlP),color:pnl>=0?'var(--green)':'var(--red)'}].map(m=>(
          <div key={m.label} style={{padding:'12px 0'}}>
            <div style={{fontSize:8,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'var(--t2)',marginBottom:5}}>{m.label}</div>
            <div style={{fontSize:17,fontWeight:700,fontFamily:'var(--mono)',color:m.color||'var(--t1)'}}>{m.val}</div>
            {m.sub&&<div style={{fontSize:9,fontFamily:'var(--mono)',color:m.color}}>{m.sub}</div>}
          </div>
        ))}
      </div>

      {/* Win stats */}
      <div className="card" style={{marginBottom:11}}>
        <div className="ct">Performance Stats</div>
        <div className="stat-row">
          <div>
            <div style={{fontSize:7,color:'var(--t2)',letterSpacing:1,textTransform:'uppercase',marginBottom:2}}>Win Rate</div>
            <div style={{fontSize:20,fontWeight:700,color:winStats.wr>=50?'var(--green)':winStats.total===0?'var(--t2)':'var(--red)',fontFamily:'var(--mono)'}}>{winStats.wr.toFixed(1)}%</div>
          </div>
          {[{l:'Trades',v:winStats.total},{l:'Wins',v:winStats.wins,c:'var(--green)'},{l:'Losses',v:winStats.losses,c:'var(--red)'},{l:'Avg Win',v:'$'+nf(winStats.avgW),c:'var(--green)'},{l:'Avg Loss',v:'$'+nf(winStats.avgL),c:'var(--red)'},{l:'Prof. Factor',v:winStats.pf.toFixed(2),c:winStats.pf>=1?'var(--green)':winStats.total===0?'var(--t2)':'var(--red)'}].map(s=>(
            <div key={s.l}>
              <div style={{fontSize:7,color:'var(--t2)',letterSpacing:1,textTransform:'uppercase',marginBottom:2}}>{s.l}</div>
              <div style={{fontSize:13,fontWeight:700,color:s.c||'#fff',fontFamily:'var(--mono)'}}>{s.v}</div>
            </div>
          ))}
          {winStats.best&&<div><div style={{fontSize:7,color:'var(--t2)',letterSpacing:1,marginBottom:2}}>BEST TRADE</div><div style={{fontSize:11,color:'var(--green)',fontFamily:'var(--mono)'}}>{winStats.best.ticker} +${nf(winStats.best.pnl)}</div></div>}
          {winStats.worst&&<div><div style={{fontSize:7,color:'var(--t2)',letterSpacing:1,marginBottom:2}}>WORST TRADE</div><div style={{fontSize:11,color:'var(--red)',fontFamily:'var(--mono)'}}>{winStats.worst.ticker} -${nf(Math.abs(winStats.worst.pnl))}</div></div>}
        </div>
      </div>

      {/* Plan ahead */}
      {latestPlan&&(
        <div className="feed plan" style={{marginBottom:11}}>
          <div style={{fontSize:8,color:'var(--t2)',marginBottom:4,letterSpacing:1}}>SHERKVIEW — PLAN AHEAD</div>
          <div style={{fontSize:11,lineHeight:1.85,color:'var(--t1)'}}>{latestPlan}</div>
        </div>
      )}

      {/* Positions */}
      <div className="g2" style={{marginBottom:11}}>
        <div className="card">
          <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:8}}>
            <span className="l1">Lane 1 — Mirror</span>
            <div style={{display:'flex',marginLeft:'auto'}}>
              {[{id:'table',l:'≡'},{id:'map',l:'▦'}].map(v=><button key={v.id} className={`vt-btn${posView===v.id+'-l1'?' vta':''}`} onClick={()=>setPosView(v.id+'-l1')}>{v.l}</button>)}
            </div>
          </div>
          {portfolio.length===0?<div style={{color:'var(--t2)',fontSize:9}}>Add real holdings above first</div>:
          posView==='map-l1'?<Treemap holdings={lane1m.filter(h=>h.pos).map(h=>({ticker:h.ticker,qty:h.pos.qty,avgCost:h.pos.avgCost}))} prices={prices}/>:
          <table className="tbl">
            <thead><tr><th>Ticker</th><th>Value</th><th>Entry</th><th>Now</th><th>P&L</th><th>Status</th></tr></thead>
            <tbody>{lane1m.map(({ticker,pos})=>{
              if(!pos)return <tr key={ticker}><td><Chip t={ticker}/></td><td colSpan={6} style={{color:'var(--t2)',fontSize:9}}>Scanning for signal…</td></tr>;
              const cur=prices[ticker]||pos.avgCost,pnl_=(cur-pos.avgCost)*pos.qty,ret=((cur-pos.avgCost)/pos.avgCost)*100;
              const intent=pos.partialTaken?`Trailing remainder — peak $${nf(pos.highWater||cur)}. Exit if drops 8% from peak.`:ret>5?'Approaching partial exit at +10%. Will sell 50% and trail rest.':ret<-5?'Near stop loss (-8%). Watching closely.':'Holding. Waiting for +10% to take partial profit.';
              return <tr key={ticker}>
                <td><Chip t={ticker}/></td>
                <td style={{fontFamily:'var(--mono)',fontWeight:700}}>{$f(cur*pos.qty)}</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--t2)'}}>{nf(pos.avgCost)}</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--t1)'}}>{nf(cur)}</td>
                <td style={{fontFamily:'var(--mono)',color:pnl_>=0?'var(--green)':'var(--red)'}}>{fmt$(pnl_,true)}</td>
                <td>{pos.partialTaken?<span className="tag ta">trailing</span>:<span className="tag tb">open</span>}</td>
                <td onClick={e=>e.stopPropagation()}><IntentionBtn intent={intent}/></td>
              </tr>;
            })}</tbody>
          </table>}
        </div>
        <div className="card">
          <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:8}}>
            <span className="l2">Lane 2 — Scout</span>
          </div>
          {lane2.length===0?<div style={{color:'var(--t2)',fontSize:9}}>No scout positions — scanning watchlist every 30s</div>:
          <table className="tbl">
            <thead><tr><th>Ticker</th><th>Value</th><th>Entry</th><th>Now</th><th>P&L</th><th>Theme</th></tr></thead>
            <tbody>{lane2.map(([t,p])=>{
              const cur=prices[t]||p.avgCost,pnl_=(cur-p.avgCost)*p.qty,ret=((cur-p.avgCost)/p.avgCost)*100;
              const intent=p.partialTaken?`Trailing remainder — peak $${nf(p.highWater||cur)}. Exit on 8% pullback from peak.`:ret>5?`Up ${ret.toFixed(1)}%. Will take 50% profit at +10%, trail rest to +30%.`:ret<-5?`Down ${ret.toFixed(1)}%. Stop loss at -8% — watching closely.`:`Holding. Target: partial exit at +10%, max +30%.`;
              return <tr key={t}>
                <td><Chip t={t}/></td>
                <td style={{fontFamily:'var(--mono)',fontWeight:700}}>{$f(cur*p.qty)}</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--t2)'}}>{nf(p.avgCost)}</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--t1)'}}>{nf(cur)}</td>
                <td style={{fontFamily:'var(--mono)',color:pnl_>=0?'var(--green)':'var(--red)'}}>{fmt$(pnl_,true)}</td>
                <td><span className={`tag ${THEME_CLS[p.theme]||'tb'}`}>{p.theme}</span></td>
                <td onClick={e=>e.stopPropagation()}><IntentionBtn intent={intent}/></td>
              </tr>;
            })}</tbody>
          </table>}
        </div>
      </div>

      {/* Scout Discoveries */}
      {(scoutWatchlist&&scoutWatchlist.length>0||scoutScanning)&&(
        <div className="card" style={{marginBottom:11}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:11}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span className="ct" style={{marginBottom:0}}>Scout Discoveries</span>
              {scoutScanning&&<span style={{fontSize:9,color:'var(--t2)'}} className="pulse">scanning…</span>}
            </div>
            <span style={{fontSize:9,color:'var(--t2)'}}>{scoutWatchlist.length} watching · next scan every 2h</span>
          </div>
          {scoutWatchlist.length===0&&<div style={{color:'var(--t2)',fontSize:10}}>Scout is scanning — discoveries appear here</div>}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {scoutWatchlist.map((s)=>{
              const cur=prices[s.t];
              const hist=priceHist[s.t]||[];
              const ma10=hist.length>=10?hist.slice(-10).reduce((a,b)=>a+b,0)/10:null;
              const ma20=hist.length>=20?hist.slice(-20).reduce((a,b)=>a+b,0)/20:null;
              const rawSig=ma10&&ma20?(ma10/ma20-1)*100:null;
              const sigPct=rawSig!==null?Math.min(Math.max(rawSig,0),1):null;
              const sigBar=sigPct!==null?Math.round(sigPct/0.4*100):0;
              const status=sigBar>=100?'ready':'watching';
              const statusClr=sigBar>=100?'var(--green)':'var(--t2)';
              return(
                <div key={s.t} style={{display:'grid',gridTemplateColumns:'auto 1fr auto',gap:'0 14px',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--bd)'}}>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3}}>
                      <span style={{fontWeight:700,fontSize:13,color:'var(--t1)',fontFamily:'var(--mono)'}}>{s.t}</span>
                      <span className={`tag ${THEME_CLS[s.theme]||'tb'}`} style={{fontSize:8}}>{s.theme}</span>
                      <span style={{fontSize:11,color:'var(--t1)',fontFamily:'var(--mono)'}}>{cur?('$'+nf(cur)):<span className="pulse dim">—</span>}</span>
                    </div>
                    <div style={{fontSize:10,color:'var(--t2)',lineHeight:1.6,maxWidth:420}}>{s.why||s.reason||'—'}</div>
                    {s.signal&&<div style={{fontSize:9,color:'var(--t2)',marginTop:3}}>Entry trigger: <span style={{color:'var(--t1)'}}>{s.signal}</span></div>}
                  </div>
                  <div style={{minWidth:120}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:8,color:'var(--t2)',marginBottom:3}}>
                      <span>Signal</span>
                      <span style={{color:statusClr}}>{status}</span>
                    </div>
                    <div style={{height:3,background:'var(--bd)',borderRadius:2,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${Math.min(sigBar,100)}%`,background:sigBar>=100?'var(--green)':'var(--blue)',borderRadius:2,transition:'width .5s'}}/>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:4}}>
                    <IntentionBtn intent={`Watching ${s.t} — ${s.signal||'waiting for MA crossover signal'}. Entry threshold: 0.4% signal strength. Current signal: ${sigBar}% of threshold.`}/>
                    <button onClick={()=>setScoutWatchlist(prev=>prev.filter(x=>x.t!==s.t))} style={{background:'none',border:'none',color:'var(--t2)',cursor:'pointer',fontSize:11,padding:'0 4px'}}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Intel feed */}
      <div className="card" style={{marginBottom:11}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:9}}>
          <span className="ct" style={{marginBottom:0}}>Intelligence Feed</span>
          <button className="btn sm" onClick={onScan} disabled={scanning}>{scanning?'⟳ Scanning…':'↻ Scan'}</button>
        </div>
        {feed.length===0?<div style={{color:'var(--t2)',fontSize:11,padding:'20px 0'}}><span className="pulse">Initializing…</span></div>:
        <div style={{maxHeight:280,overflowY:'auto'}}>
          {feed.map((e,i)=>(
            <div key={i} className={`feed ${e.type||''}`}>
              <div style={{fontSize:7,color:'var(--t2)',marginBottom:4,letterSpacing:1,textTransform:'uppercase'}}>{e.ts} · {e.label}</div>
              <div style={{fontSize:11,lineHeight:1.85,whiteSpace:'pre-wrap',color:'var(--t1)'}}>{e.text}</div>
            </div>
          ))}
        </div>}
      </div>

      {/* Trade log */}
      <TradeLog trades={trades}/>
    </div>
  );
}

/* ── PERFORMANCE PAGE ───────────────────────────────────────────────────────── */
function PerformancePage({trades,pnlHistory,portfolio,prices,prevClose}){
  const chartRef=useRef(null);
  const chartInst=useRef(null);
  const [mode,setMode]=useState('algo');
  const [period,setPeriod]=useState('ALL');

  const filterByPeriod=(list)=>{
    if(period==='ALL')return list;
    const days={'1W':7,'1M':30,'3M':90,'6M':180,'1Y':365}[period]||9999;
    const cutoff=new Date(Date.now()-days*24*60*60*1000);
    return list.filter(t=>new Date(t.ts||0)>=cutoff);
  };

  const filteredTrades=useMemo(()=>filterByPeriod(trades),[trades,period]);
  const winStats=useMemo(()=>calcWinRate(filteredTrades),[filteredTrades]);

  const filteredPnlHistory=useMemo(()=>{
    if(period==='ALL')return pnlHistory;
    const days={'1W':7,'1M':30,'3M':90,'6M':180,'1Y':365}[period]||9999;
    return pnlHistory.slice(-days*96);
  },[pnlHistory,period]);

  useEffect(()=>{
    if(!chartRef.current)return;
    if(chartInst.current)chartInst.current.destroy();
    if(mode==='algo'){
      if(filteredPnlHistory.length<2)return;
      const isPos=filteredPnlHistory[filteredPnlHistory.length-1]?.v>=0;
      chartInst.current=new Chart(chartRef.current,{
        type:'line',
        data:{labels:filteredPnlHistory.map(p=>p.label),datasets:[{data:filteredPnlHistory.map(p=>p.v),borderColor:isPos?'var(--green)':'var(--red)',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:.35}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'$'+c.raw.toLocaleString()}}},scales:{x:{grid:{color:'#22222280'},ticks:{color:'#555',font:{family:'Space Mono',size:8},maxTicksLimit:8}},y:{grid:{color:'#22222280'},ticks:{color:'#555',font:{family:'Space Mono',size:8},callback:v=>'$'+v.toLocaleString()}}}}
      });
    } else {
      if(!portfolio.length)return;
      const labels=portfolio.map(h=>h.ticker);
      const vals=portfolio.map(h=>{const cur=prices[h.ticker]||h.avgCost;return Math.round((cur-h.avgCost)*h.qty);});
      const colors=vals.map(v=>v>=0?'#3DD68C':'#E05252');
      chartInst.current=new Chart(chartRef.current,{
        type:'bar',
        data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:0,borderRadius:4}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'P&L: $'+c.raw.toLocaleString()}}},scales:{x:{grid:{color:'#22222280'},ticks:{color:'#555',font:{family:'Space Mono',size:9}}},y:{grid:{color:'#22222280'},ticks:{color:'#555',font:{family:'Space Mono',size:8},callback:v=>'$'+v.toLocaleString()}}}}
      });
    }
    return()=>{if(chartInst.current)chartInst.current.destroy();};
  },[mode,filteredPnlHistory,portfolio,prices]);

  const byTheme=useMemo(()=>{
    const map={};
    filteredTrades.filter(t=>t.action==='SELL'&&t.pnl!=null).forEach(t=>{
      const theme=t.theme||'other';
      if(!map[theme])map[theme]={pnl:0,trades:0};
      map[theme].pnl+=t.pnl;map[theme].trades++;
    });
    return Object.entries(map).sort((a,b)=>b[1].pnl-a[1].pnl);
  },[trades]);

  return(
    <div>
      <div style={{marginBottom:11}}>
        <div style={{fontFamily:'var(--disp)',fontSize:17,fontWeight:800,color:'var(--t1)',marginBottom:3}}>Performance</div>
        <div style={{fontSize:10,color:'var(--t2)'}}>{mode==='algo'?'ViewOrb algo trading history':'Your real portfolio snapshot'}</div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
        <div style={{display:'flex'}}>
          <button className={`vt-btn${mode==='algo'?' vta':''}`} onClick={()=>setMode('algo')} style={{fontSize:9}}>Algo trades</button>
          <button className={`vt-btn${mode==='portfolio'?' vta':''}`} onClick={()=>setMode('portfolio')} style={{fontSize:9}}>My portfolio</button>
        </div>
        {mode==='algo'&&<div style={{display:'flex',marginLeft:8}}>
          {['1W','1M','3M','6M','1Y','ALL'].map(p=>(
            <button key={p} className={`vt-btn${period===p?' vta':''}`} onClick={()=>setPeriod(p)} style={{fontSize:9,padding:'2px 7px'}}>{p}</button>
          ))}
        </div>}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:9,marginBottom:11}}>
        {[{l:'Win Rate',v:`${winStats.wr.toFixed(1)}%`,c:winStats.wr>=50?'var(--green)':winStats.total===0?'var(--t2)':'var(--red)'},{l:'Total Trades',v:winStats.total},{l:'Wins',v:winStats.wins,c:'var(--green)'},{l:'Losses',v:winStats.losses,c:'var(--red)'},{l:'Avg Win',v:'$'+nf(winStats.avgW),c:'var(--green)'},{l:'Profit Factor',v:winStats.pf.toFixed(2),c:winStats.pf>=1?'var(--green)':winStats.total===0?'var(--t2)':'var(--red)'}].map(s=>(
          <div key={s.l} className="card">
            <div style={{fontSize:7,color:'var(--t2)',letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>{s.l}</div>
            <div style={{fontSize:15,fontWeight:700,fontFamily:'var(--mono)',color:s.c||'#fff'}}>{s.v}</div>
          </div>
        ))}
      </div>

      <div className="card" style={{marginBottom:11}}>
        <div className="ct">P&L Over Time</div>
        {pnlHistory.length<2?<div style={{color:'var(--t2)',textAlign:'center',padding:'30px 0',fontSize:10}}>Chart builds as trades execute…</div>:
        <div style={{height:200}}><canvas ref={chartRef}/></div>}
      </div>

      {byTheme.length>0&&(
        <div className="card" style={{marginBottom:11}}>
          <div className="ct">P&L by Theme</div>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            {byTheme.map(([theme,d])=>(
              <div key={theme} style={{minWidth:100}}>
                <span className={`tag ${THEME_CLS[theme]||'tb'}`} style={{marginBottom:5,display:'inline-block'}}>{theme}</span>
                <div style={{fontFamily:'var(--mono)',fontWeight:700,color:d.pnl>=0?'var(--green)':'var(--red)',fontSize:13}}>{fmt$(d.pnl,true)}</div>
                <div style={{fontSize:9,color:'var(--t2)'}}>{d.trades} trades</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {mode==='portfolio'&&(
        <div className="card" style={{marginBottom:11}}>
          <div className="ct">My portfolio — P&L snapshot</div>
          {portfolio.length===0?<div style={{color:'var(--t2)',fontSize:10}}>No portfolio holdings yet</div>:
          <table className="tbl">
            <thead><tr><th>Ticker</th><th>Shares</th><th>Entry</th><th>Current</th><th>Value</th><th>Day %</th><th>P&L %</th><th>P&L $</th></tr></thead>
            <tbody>{portfolio.map(h=>{
              const cur=prices[h.ticker]||h.avgCost,prev=prevClose[h.ticker]||h.avgCost;
              const dayC=((cur-prev)/prev)*100,pnl=(cur-h.avgCost)*h.qty,pnlP=((cur-h.avgCost)/h.avgCost)*100,val=cur*h.qty;
              return <tr key={h.ticker}>
                <td><Chip t={h.ticker}/></td>
                <td style={{fontFamily:'var(--mono)',color:'var(--t2)'}}>{h.qty}</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--t2)'}}>{nf(h.avgCost)}</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--t1)',fontWeight:700}}>{nf(cur)}</td>
                <td style={{fontFamily:'var(--mono)'}}>{$f(val)}</td>
                <td style={{fontFamily:'var(--mono)',color:dayC>=0?'var(--green)':'var(--red)'}}>{pct(dayC)}</td>
                <td style={{fontFamily:'var(--mono)',color:pnlP>=0?'var(--green)':'var(--red)'}}>{pct(pnlP)}</td>
                <td style={{fontFamily:'var(--mono)',color:pnl>=0?'var(--green)':'var(--red)'}}>{fmt$(pnl,true)}</td>
              </tr>;
            })}</tbody>
          </table>}
        </div>
      )}
      {mode==='algo'&&trades.length===0?<div style={{color:'var(--t2)',textAlign:'center',fontSize:10,padding:'30px 0'}}>No algo trades yet</div>:mode==='algo'&&(
      <div className="card">
        <div className="ct">All Closed Trades</div>
        <div style={{maxHeight:300,overflowY:'auto'}}>
          <table className="tbl" style={{minWidth:600}}>
            <thead><tr><th>Side</th><th>Ticker</th><th>Value</th><th>P&L</th><th>Theme</th><th>Reason</th><th>Time</th></tr></thead>
            <tbody>
              {[...trades].filter(t=>t.action==='SELL'&&t.pnl!=null).reverse().map((tr,i)=>(
                <tr key={i}>
                  <td><span className="tag tr">SELL</span></td>
                  <td><Chip t={tr.ticker}/></td>
                  <td style={{fontFamily:'var(--mono)'}}>{$f(tr.posValue||0)}</td>
                  <td style={{fontFamily:'var(--mono)',color:tr.pnl>=0?'var(--green)':'var(--red)'}}>{fmt$(tr.pnl,true)}</td>
                  <td>{tr.theme?<span className={`tag ${THEME_CLS[tr.theme]||'tb'}`}>{tr.theme}</span>:'—'}</td>
                  <td style={{fontSize:9,color:'var(--t2)',maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{tr.reason}</td>
                  <td style={{fontSize:9,color:'var(--t2)',fontFamily:'var(--mono)',whiteSpace:'nowrap'}}>{tr.ts instanceof Date?tr.ts.toLocaleTimeString('en-US',{hour12:false}):'—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>)}
    </div>
  );
}

/* ── SETTINGS MODAL ─────────────────────────────────────────────────────────── */
function SettingsModal({onClose,onReset,userPhone,setUserPhone}){
  return(
    <div className="mo-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="mo-card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontFamily:'var(--disp)',fontSize:16,fontWeight:800,color:'#fff'}}>Settings</div>
          <button className="btn sm" onClick={onClose}>✕</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:18}}>
          <div style={{marginBottom:4}}>
            <div style={{fontSize:8,color:'var(--t2)',letterSpacing:1,textTransform:'uppercase',marginBottom:5}}>Update API Keys — no data lost</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:7}}>
              <div>
                <div style={{fontSize:8,color:'var(--t2)',marginBottom:3}}>FINNHUB KEY</div>
                <input type="password" id="new-fk" placeholder="d8xxxxxxxxxxxxxxxx" style={{width:'100%',fontSize:10}}/>
              </div>
              <div>
                <div style={{fontSize:8,color:'var(--t2)',marginBottom:3}}>ANTHROPIC KEY</div>
                <input type="password" id="new-ak" placeholder="sk-ant-..." style={{width:'100%',fontSize:10}}/>
              </div>
            </div>
            <button className="btn" style={{fontSize:10}} onClick={()=>{
              const fk=document.getElementById('new-fk').value.trim();
              const ak=document.getElementById('new-ak').value.trim();
              if(fk){localStorage.setItem('sv_fk',fk);}
              if(ak){localStorage.setItem('sv_ak',ak);}
              if(fk||ak){alert('Keys updated — refreshing now.');window.location.reload();}
              else{alert('Enter at least one key to update.');}
            }}>Update keys</button>
          </div>
          <div style={{height:'1px',background:'var(--bd)',margin:'4px 0'}}/>
          <button className="btn" onClick={()=>{if(confirm('Reset ViewOrb to $40,000 and clear all trades?')){onReset();onClose();}}}>↺ Reset algo to $40,000</button>
          <button className="btn dng" onClick={()=>{if(confirm('This clears ALL data including your portfolio and trades. Cannot be undone.')){localStorage.clear();window.location.reload();}}}>✕ Clear everything &amp; start fresh</button>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:8,color:'var(--t2)',letterSpacing:1,textTransform:'uppercase',marginBottom:5}}>SMS Alerts — your phone number</div>
          <div style={{display:'flex',gap:7,alignItems:'center'}}>
            <input type="tel" value={userPhone} onChange={e=>setUserPhone(e.target.value)} placeholder="+1234567890 (with country code)" style={{flex:1,fontSize:10}}/>
          </div>
          <div style={{fontSize:9,color:'var(--t2)',marginTop:3}}>Include country code. Receives ViewOrb trade signals via SMS.</div>
        </div>
        <div style={{fontSize:9,color:'var(--t2)',lineHeight:1.9,borderTop:'1px solid var(--bd)',paddingTop:12}}>
          <strong style={{color:'var(--t1)'}}>ViewOrb v1.2 — Phase 1</strong><br/>
          Universe: Space · AI · Chips · Data Centers<br/>
          Stop loss 8% · Partial exit 10% · Max target 30%<br/>
          Trailing stop 8% from peak · Max 5 positions<br/>
          Algo fires every 30s · Intel scan every 5 min<br/>
          Morning brief daily on first load
        </div>
      </div>
    </div>
  );
}

/* ── APP ────────────────────────────────────────────────────────────────────── */
function App(){
  const [cfg,setCfg]=useState(()=>({fk:localStorage.getItem('sv_fk')||'',ak:localStorage.getItem('sv_ak')||''}));
  const ready=!!(cfg.fk&&cfg.ak);

  const [prices,setPrices]=useState({});
  const [prevClose,setPrevClose]=useState({});
  const [fundamentals,setFundamentals]=useState({});
  const [lastPoll,setLastPoll]=useState(null);
  const [tab,setTab]=useState('Dashboard');
  const [showSettings,setShowSettings]=useState(false);

  const [portfolio,setPortfolio]=useState(()=>{try{return JSON.parse(localStorage.getItem('sv_port')||'[]');}catch(e){return[];}});
  const [mirrorSet,setMirrorSet]=useState(()=>{try{return JSON.parse(localStorage.getItem('sv_mirror')||'{}');}catch(e){return{};}});
  const [indices,setIndices]=useState(()=>{try{const s=localStorage.getItem('sv_indices');return s?JSON.parse(s):DEFAULT_INDICES;}catch(e){return DEFAULT_INDICES;}});
  const [vbCash,setVbCash]=useState(()=>parseFloat(localStorage.getItem('sv_cash')||'40000'));
  const [vbPos,setVbPos]=useState(()=>{try{return JSON.parse(localStorage.getItem('sv_pos')||'{}');}catch(e){return{};}});
  const [vbTrades,setVbTrades]=useState(()=>{try{return JSON.parse(localStorage.getItem('sv_trades')||'[]',(_,v)=>v&&v._isDate?new Date(v.val):v);}catch(e){return[];}});
  const [feed,setFeed]=useState(()=>{
    try{
      const saved=JSON.parse(localStorage.getItem('sv_feed')||'[]');
      const savedDate=localStorage.getItem('sv_feed_date');
      const today=new Date().toDateString();
      if(savedDate!==today){localStorage.setItem('sv_feed_date',today);return[];}
      return saved;
    }catch(e){return[];}
  });
  const [scanning,setScanning]=useState(false);
  const [scoutWatchlist,setScoutWatchlist]=useState(()=>{try{return JSON.parse(localStorage.getItem('sv_scout_wl')||'[]');}catch(e){return[];}});
  const [signals,setSignals]=useState(()=>{try{return JSON.parse(localStorage.getItem('sv_signals')||'[]');}catch(e){return[];}});
  const [realMirror,setRealMirror]=useState(()=>{try{return JSON.parse(localStorage.getItem('sv_real_mirror')||'[]');}catch(e){return[];}});
  const [notifsMuted,setNotifsMuted]=useState(()=>localStorage.getItem('sv_notifs_muted')==='true');
  const [userPhone,setUserPhone]=useState(()=>localStorage.getItem('sv_phone')||'');
  const [activeSignal,setActiveSignal]=useState(null);
  const [scoutScanning,setScoutScanning]=useState(false);
  const [pnlHistory,setPnlHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem('sv_pnl_hist')||'[]');}catch(e){return[];}});

  const priceHist=useRef({});
  const pricesRef=useRef(prices);
  const cashRef=useRef(vbCash);
  const posRef=useRef(vbPos);
  const portRef=useRef(portfolio);
  const intelRef=useRef('');
  const tradesRef=useRef(vbTrades);
  const mirrorRef=useRef(mirrorSet);
  const indicesRef=useRef(indices);
  const scoutWlRef=useRef(scoutWatchlist);

  useEffect(()=>{pricesRef.current=prices;},[prices]);
  useEffect(()=>{cashRef.current=vbCash;},[vbCash]);
  useEffect(()=>{posRef.current=vbPos;},[vbPos]);
  useEffect(()=>{portRef.current=portfolio;},[portfolio]);
  useEffect(()=>{tradesRef.current=vbTrades;},[vbTrades]);
  useEffect(()=>{mirrorRef.current=mirrorSet;},[mirrorSet]);
  useEffect(()=>{indicesRef.current=indices;},[indices]);
  useEffect(()=>{scoutWlRef.current=scoutWatchlist;},[scoutWatchlist]);
  useEffect(()=>localStorage.setItem('sv_scout_wl',JSON.stringify(scoutWatchlist)),[scoutWatchlist]);
  useEffect(()=>localStorage.setItem('sv_signals',JSON.stringify(signals.slice(-100))),[signals]);
  useEffect(()=>localStorage.setItem('sv_real_mirror',JSON.stringify(realMirror.slice(-200))),[realMirror]);
  useEffect(()=>localStorage.setItem('sv_notifs_muted',String(notifsMuted)),[notifsMuted]);
  useEffect(()=>localStorage.setItem('sv_phone',userPhone),[userPhone]);

  useEffect(()=>localStorage.setItem('sv_port',JSON.stringify(portfolio)),[portfolio]);
  useEffect(()=>localStorage.setItem('sv_cash',String(vbCash)),[vbCash]);
  useEffect(()=>localStorage.setItem('sv_pos',JSON.stringify(vbPos)),[vbPos]);
  useEffect(()=>localStorage.setItem('sv_trades',JSON.stringify(vbTrades.slice(-500))),[vbTrades]);
  useEffect(()=>localStorage.setItem('sv_pnl_hist',JSON.stringify(pnlHistory.slice(-500))),[pnlHistory]);
  useEffect(()=>localStorage.setItem('sv_feed',JSON.stringify(feed.slice(-30))),[feed]);
  useEffect(()=>localStorage.setItem('sv_mirror',JSON.stringify(mirrorSet)),[mirrorSet]);
  useEffect(()=>localStorage.setItem('sv_scout_wl',JSON.stringify(scoutWatchlist)),[scoutWatchlist]);
  useEffect(()=>localStorage.setItem('sv_signals',JSON.stringify(signals.slice(-100))),[signals]);
  useEffect(()=>localStorage.setItem('sv_real_mirror',JSON.stringify(realMirror.slice(-200))),[realMirror]);
  useEffect(()=>localStorage.setItem('sv_notifs_muted',String(notifsMuted)),[notifsMuted]);
  useEffect(()=>localStorage.setItem('sv_phone',userPhone),[userPhone]);

  /* Price polling */
  const pollPrices=useCallback(async(tickers)=>{
    await pollBatch(tickers,cfg.fk,1100,(sym,q)=>{
      setPrices(p=>({...p,[sym]:q.c}));
      setPrevClose(p=>({...p,[sym]:q.pc}));
      if(!priceHist.current[sym])priceHist.current[sym]=[];
      priceHist.current[sym].push(q.c);
      if(priceHist.current[sym].length>120)priceHist.current[sym].shift();
    });
    setLastPoll(new Date().toLocaleTimeString('en-US',{hour12:false}));
  },[cfg.fk]);

  /* Fundamentals (once per session per ticker) */
  const fetchFundamentals=useCallback(async(tickers)=>{
    for(const sym of tickers){
      if(fundamentals[sym])continue;
      const f=await fhMetric(sym,cfg.fk);
      if(f.h52)setFundamentals(p=>({...p,[sym]:f}));
      await new Promise(r=>setTimeout(r,400));
    }
  },[cfg.fk,fundamentals]);

  useEffect(()=>{
    if(!ready)return;
    const all=()=>[...new Set([...WATCHLIST.map(s=>s.t),...indicesRef.current.map(i=>i.proxy),...portRef.current.map(h=>h.ticker),...scoutWlRef.current.map(s=>s.t)])];
    pollPrices(all());
    const id=setInterval(()=>pollPrices(all()),30000);
    return()=>clearInterval(id);
  },[ready,pollPrices]);

  useEffect(()=>{
    if(!ready)return;
    const tickers=[...WATCHLIST.map(s=>s.t),...portRef.current.map(h=>h.ticker)];
    setTimeout(()=>fetchFundamentals(tickers),10000);
  },[ready]);

  useEffect(()=>{
    if(!ready||portfolio.length===0)return;
    const unknown=portfolio.filter(h=>!prices[h.ticker]).map(h=>h.ticker);
    if(unknown.length>0)pollPrices(unknown);
  },[portfolio,ready]);

  /* Algo tick */
  useEffect(()=>{
    if(!ready)return;
    const id=setInterval(()=>{
      // Lane 1 mirrors enabled portfolio tickers + fixed watchlist tickers
      const portMirror=portRef.current
        .filter(h=>mirrorRef.current[h.ticker]!==false)
        .map(h=>{const wl=WATCHLIST.find(w=>w.t===h.ticker);return{t:h.ticker,theme:wl?.theme||'portfolio'};});
      const wlMirror=WATCHLIST.filter(w=>!portMirror.find(p=>p.t===w.t)).map(w=>({t:w.t,theme:w.theme}));
      const mirrorEnabled=[...portMirror,...wlMirror];
      // Lane 2 is fully free — only trades scout discoveries
      // Lane 1 covers the fixed watchlist via mirrorEnabled
      const dynamicUniverse=scoutWlRef.current.map(s=>({
        t:s.t,n:s.name||s.t,theme:s.theme||'scout',isScout:true,conviction:s.conviction||0.5
      }));
      const r=runAlgo(cashRef.current,posRef.current,pricesRef.current,priceHist.current,intelRef.current,mirrorEnabled,dynamicUniverse);
      if(r.newTrades.length>0){
        setVbCash(r.cash);setVbPos(r.positions);
        setVbTrades(prev=>[...prev,...r.newTrades].slice(-500));
        // Generate trade signals for user
        r.newTrades.forEach(trade=>{
          const BUY_DEV=0.03,SELL_DEV=0.05;
          const validMins=trade.action==='BUY'?15:30;
          const expiry=new Date(Date.now()+validMins*60000);
          const sig={
            id:Date.now()+Math.random(),
            action:trade.action,
            ticker:trade.ticker,
            price:trade.price,
            posValue:trade.posValue||0,
            deviation:trade.action==='BUY'?BUY_DEV:SELL_DEV,
            validMins,
            expiry:expiry.toISOString(),
            reason:trade.reason,
            ts:new Date().toISOString(),
            confirmed:null,
          };
          setSignals(prev=>[sig,...prev].slice(-100));
          setActiveSignal(sig);
          // Send SMS signal
          const devPct=(sig.deviation*100).toFixed(0);
          const upper=nf(sig.price*(1+sig.deviation));
          const lower=nf(sig.price*(1-sig.deviation));
          const smsMsg=sig.action==='BUY'
            ?`VIEWORB: BUY ${sig.ticker} @ $${nf(sig.price)} — Valid ${sig.validMins}min — Skip if above $${upper} (+${devPct}%) or below $${lower} (-${devPct}%)`
            :`VIEWORB: SELL ${sig.ticker} @ $${nf(sig.price)} — Valid ${sig.validMins}min — Skip if below $${lower} (-${devPct}%)`;
          sendSMS(smsMsg);
        });
        const tv=r.cash+Object.entries(r.positions).reduce((s,[t,p])=>s+(pricesRef.current[t]||p.avgCost)*p.qty,0);
        const label=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit'});
        setPnlHistory(prev=>[...prev,{label,v:Math.round(tv-40000)}].slice(-500));
      }
    },30000);
    return()=>clearInterval(id);
  },[ready]);

  /* Intel scan */
  const scan=useCallback(async(isBrief=false)=>{
    if(scanning)return;
    setScanning(true);
    try{
      const text=await vieworbScan(cfg.ak,portRef.current,posRef.current,cashRef.current,tradesRef.current,isBrief);
      intelRef.current=text;
      const type=isBrief?'brief':text.toLowerCase().includes('contract')||text.toLowerCase().includes('award')?'sig':'';
      const sevenDaysAgo=new Date(Date.now()-7*24*60*60*1000);
      setFeed(prev=>[{ts:tsNow(),label:isBrief?'Morning Brief':'Market Scan',text,type,created:new Date().toISOString()},...prev].filter(e=>!e.created||new Date(e.created)>sevenDaysAgo).slice(0,200));
    }catch(e){
      setFeed(prev=>[{ts:tsNow(),label:'Error',text:`Scan failed: ${e.message}`,type:'warn',created:new Date().toISOString()},...prev].slice(0,200));
    }
    setScanning(false);
  },[scanning,cfg.ak]);

  /* Scout dedicated scan — finds new tradeable tickers in the ecosystem */
  const scoutScan=useCallback(async()=>{
    if(scoutScanning)return;
    setScoutScanning(true);
    try{
      const portTickers=portRef.current.map(h=>h.ticker).join(', ')||'RKLB, NVDA, PLTR';
      const existing=[...WATCHLIST.map(s=>s.t),...scoutWlRef.current.map(s=>s.t)].join(', ');
      const prompt=`Trading scout. Thesis: space economy, AI, chips, data centers. Already watching: ${existing}.

Search web for space/AI/chip stocks moving today — contracts, earnings, analyst moves, unusual volume.

Return ONLY valid JSON, no markdown:
[{"t":"TICKER","name":"Company Name","why":"what happened + why it matters now (1 sentence)","signal":"what needs to happen for entry (1 short phrase)","conviction":0.7,"theme":"space|ai|chips|datacenter"}]

Max 5 tickers. Only genuinely compelling right now. If nothing, return [].`;

      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':cfg.ak,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})
      });
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
      const s=text.indexOf('['),e=text.lastIndexOf(']');
      if(s!==-1&&e>s){
        const found=JSON.parse(text.slice(s,e+1));
        if(found.length>0){
          const stamped=found.map(f=>({...f,foundAt:new Date().toISOString()}));
          setScoutWatchlist(prev=>{
            const existing=prev.map(p=>p.t);
            const fresh=stamped.filter(f=>!existing.includes(f.t));
            return [...prev,...fresh].slice(-20);
          });
        }
      }
    }catch(e){console.warn('Scout scan failed:',e.message);}
    setScoutScanning(false);
  },[cfg.ak,scoutScanning]);

  /* Scout scan timer — every 2 hours, rate guarded */
  useEffect(()=>{
    if(!ready)return;
    const SCOUT_KEY='sv_last_scout';
    const TWO_HOURS=2*60*60*1000;
    const tryScout=()=>{
      const last=parseInt(localStorage.getItem(SCOUT_KEY)||'0');
      if(Date.now()-last>=TWO_HOURS){
        scoutScan();
        localStorage.setItem(SCOUT_KEY,String(Date.now()));
      }
    };
    const t=setTimeout(tryScout,12000);
    const id=setInterval(()=>{
      const last=parseInt(localStorage.getItem(SCOUT_KEY)||'0');
      if(Date.now()-last>=TWO_HOURS){
        scoutScan();
        localStorage.setItem(SCOUT_KEY,String(Date.now()));
      }
    },30*60*1000);
    return()=>{clearTimeout(t);clearInterval(id);};
  },[ready,scoutScan]);

  /* Intelligence scan — rate guarded, max 3x per day */
  useEffect(()=>{
    if(!ready)return;
    const now=Date.now();
    const lastScan=parseInt(localStorage.getItem('sv_last_scan')||'0');
    const lastBrief=localStorage.getItem('sv_last_brief');
    const today=new Date().toDateString();
    const ONE_HOUR=60*60*1000;
    const timeSinceLast=now-lastScan;

    // Morning brief — once per day, only if no scan in last hour
    if(lastBrief!==today&&timeSinceLast>ONE_HOUR){
      const t=setTimeout(()=>{
        scan(true);
        localStorage.setItem('sv_last_brief',today);
        localStorage.setItem('sv_last_scan',String(Date.now()));
      },6000);
      // Schedule subsequent scans at midday and close (4h intervals)
      const id=setInterval(()=>{
        const ls=parseInt(localStorage.getItem('sv_last_scan')||'0');
        if(Date.now()-ls>=3*ONE_HOUR){
          scan(false);
          localStorage.setItem('sv_last_scan',String(Date.now()));
        }
      },30*60*1000);
      return()=>{clearTimeout(t);clearInterval(id);};
    }

    // Not a new day — only scan if it's been more than 4 hours since last
    if(timeSinceLast>3*ONE_HOUR){
      const t=setTimeout(()=>{
        scan(false);
        localStorage.setItem('sv_last_scan',String(Date.now()));
      },6000);
      return()=>clearTimeout(t);
    }

    // Otherwise just set up the interval check without triggering immediately
    const id=setInterval(()=>{
      const ls=parseInt(localStorage.getItem('sv_last_scan')||'0');
      if(Date.now()-ls>=3*ONE_HOUR){
        scan(false);
        localStorage.setItem('sv_last_scan',String(Date.now()));
      }
    },30*60*1000);
    return()=>clearInterval(id);
  },[ready]);

  const reset=()=>{setVbCash(40000);setVbPos({});setVbTrades([]);setFeed([]);setPnlHistory([]);};
  const onSetup=(fk,ak)=>{localStorage.setItem('sv_fk',fk);localStorage.setItem('sv_ak',ak);setCfg({fk,ak});};
  const sendSMS=useCallback(async(message)=>{
    const phone=localStorage.getItem('sv_phone');
    if(!phone||notifsMuted)return;
    try{
      await fetch('/.netlify/functions/send-sms',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({to:phone,message})
      });
    }catch(e){console.warn('SMS failed:',e.message);}
  },[notifsMuted]);

  const handleExport=()=>exportDailyPDF(vbCash,vbPos,prices,vbTrades,calcWinRate(vbTrades),feed[0]?.text||'');

  const confirmSignal=useCallback((id,result)=>{
    setSignals(prev=>prev.map(s=>{
      if(s.id!==id)return s;
      const updated={...s,confirmed:result};
      // Add to real mirror log
      setRealMirror(prev2=>[...prev2,{
        ...s, confirmed:result,
        pnl:result==='yes'&&s.action==='SELL'?null:null, // P&L tracked separately
      }].slice(-200));
      return updated;
    }));
    setActiveSignal(null);
  },[]);

  const dismissSignal=useCallback((id)=>{
    setActiveSignal(null);
  },[]);

  if(!ready)return <Onboarding onComplete={onSetup}/>;

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <Header tab={tab} setTab={setTab} lastPoll={lastPoll} onSettings={()=>setShowSettings(true)} notifsMuted={notifsMuted} setNotifsMuted={setNotifsMuted}/>
      {!notifsMuted&&activeSignal&&activeSignal.confirmed===null&&(
        <SignalNotification signal={activeSignal} onConfirm={confirmSignal} onDismiss={dismissSignal}/>
      )}
      <IndicesStrip prices={prices} prevClose={prevClose} indices={indices} setIndices={setIndices}/>
      <div style={{padding:'16px 24px',flex:1}}>
        {tab==='Dashboard'&&(
          <>
            <Portfolio portfolio={portfolio} setPortfolio={setPortfolio} prices={prices} prevClose={prevClose} priceHist={priceHist.current} fundamentals={fundamentals} cfg={cfg} mirrorSet={mirrorSet} setMirrorSet={setMirrorSet}/>
            <ViewOrbPanel cash={vbCash} positions={vbPos} prices={prices} prevClose={prevClose} priceHist={priceHist.current} trades={vbTrades} feed={feed} portfolio={portfolio} mirrorSet={mirrorSet} onScan={()=>scan(false)} scanning={scanning} onExportPDF={handleExport} scoutWatchlist={scoutWatchlist} setScoutWatchlist={setScoutWatchlist} scoutScanning={scoutScanning}/>
          </>
        )}
        {tab==='Signals'&&(
          <div>
            <div style={{marginBottom:14}}>
              <div style={{fontFamily:'var(--disp)',fontSize:17,fontWeight:800,color:'var(--t1)',marginBottom:3}}>Signals</div>
              <div style={{fontSize:10,color:'var(--t2)'}}>ViewOrb trade signals — execute in your real portfolio and confirm here</div>
            </div>
            <RealMirrorLog realMirror={realMirror} prices={prices}/>
            <div className="card" style={{marginTop:11}}>
              <div className="ct">Signal History</div>
              {signals.length===0?<div style={{color:'var(--t2)',fontSize:10}}>No signals yet — algo fires every 30s</div>:
              <div style={{maxHeight:300,overflowY:'auto'}}>
                <table className="tbl">
                  <thead><tr><th>Action</th><th>Ticker</th><th>Price</th><th>Window</th><th>Confirmed</th><th>Time</th></tr></thead>
                  <tbody>{[...signals].map((s,i)=>(
                    <tr key={i}>
                      <td><span className={`tag ${s.action==='BUY'?'tg':'tr'}`}>{s.action}</span></td>
                      <td><Chip t={s.ticker}/></td>
                      <td style={{fontFamily:'var(--mono)',color:'var(--t2)'}}>${nf(s.price)}</td>
                      <td style={{fontSize:9,color:'var(--t2)',fontFamily:'var(--mono)'}}>±{(s.deviation*100).toFixed(0)}% / {s.validMins}min</td>
                      <td><span className={`tag ${s.confirmed==='yes'?'tg':s.confirmed==='missed'?'tr':s.confirmed===null?'ta':'dim-tag'}`}>{s.confirmed==='yes'?'executed':s.confirmed==='missed'?'missed':s.confirmed===null?'pending':'skipped'}</span></td>
                      <td style={{fontSize:9,color:'var(--t2)',fontFamily:'var(--mono)'}}>{new Date(s.ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false})}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>}
            </div>
          </div>
        )}
        {tab==='Performance'&&<PerformancePage trades={vbTrades} pnlHistory={pnlHistory} portfolio={portfolio} prices={prices} prevClose={prevClose}/>}
      </div>
      {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} onReset={reset} userPhone={userPhone} setUserPhone={setUserPhone}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
